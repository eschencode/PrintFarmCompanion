name: Scheduled Shopify Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ping-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Shopify Sync API
        # Hits the custom domain (behind Cloudflare Access). The Access service
        # token gets us past Access; the Bearer token is checked by the Worker.
        # --fail-with-body makes the job go red on any non-2xx so a broken sync
        # is actually visible instead of silently green.
        run: |
          curl --fail-with-body -sS "https://printfarmcompanion.pages.dev/api/cron-sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" | tee /tmp/out.json
          grep -q '"success":true' /tmp/out.json

