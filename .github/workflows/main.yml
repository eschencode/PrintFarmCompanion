name: Scheduled Shopify Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ping-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Shopify Sync API
        run: |
          curl -v -X GET "https://printfarmcompanion.pages.dev/api/cron-sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
